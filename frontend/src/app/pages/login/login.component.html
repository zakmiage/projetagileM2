<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden relative z-10 transition-all duration-300 transform">
    <!-- Top banner indicator -->
    <div class="h-2 bg-primary w-full"></div>

    <div class="p-8">
      <div class="text-center mb-8">
        <img src="/logo.png" alt="KUBIK ERP" class="mx-auto h-16 w-auto mb-4">
        <p class="mt-2 text-sm text-gray-500 font-medium">
          {{ viewMode === 'login' ? 'Connexion à votre espace' : 'Récupération de mot de passe' }}
        </p>
      </div>

      <form class="space-y-6" (ngSubmit)="onSubmit()">
        <!-- Error Message -->
        <div *ngIf="errorMsg" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center animate-fade-in text-sm font-medium shadow-sm">
          <svg class="h-5 w-5 mr-2 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          {{ errorMsg }}
        </div>

        <!-- Success Message -->
        <div *ngIf="forgotSuccessMsg" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-center animate-fade-in text-sm font-medium shadow-sm">
          <svg class="h-5 w-5 mr-2 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
          {{ forgotSuccessMsg }}
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Adresse Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required [(ngModel)]="email" class="appearance-none relative block w-full px-3 py-2.5 pl-10 border border-gray-300 placeholder-gray-400 text-text rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm transition-shadow">
          </div>
        </div>

        <div *ngIf="viewMode === 'login'">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
          <div class="relative">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <input id="password" name="password" type="password" autocomplete="current-password" required [(ngModel)]="password" class="appearance-none relative block w-full px-3 py-2.5 pl-10 border border-gray-300 placeholder-gray-400 text-text rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm transition-shadow">
          </div>
        </div>

        <div class="flex items-center justify-between" *ngIf="viewMode === 'login'">
          <div class="flex items-center">
            <span class="text-xs text-gray-400">Accès restreint</span>
          </div>

          <div class="text-sm">
             <button type="button" (click)="toggleView()" tabindex="-1" class="font-medium text-primary hover:text-opacity-80 transition hover:underline focus:outline-none">
              Mot de passe oublié ?
            </button>
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" [disabled]="isLoading" class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition shadow-md hover:shadow-lg disabled:opacity-75 disabled:cursor-wait">
            <span class="absolute left-0 inset-y-0 flex items-center pl-3">
              <svg class="h-5 w-5 text-white opacity-40 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path *ngIf="viewMode === 'login'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                <path *ngIf="viewMode === 'forgot'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </span>
            {{ isLoading ? 'Chargement...' : (viewMode === 'login' ? 'Se connecter' : 'Envoyer mon mot de passe') }}
          </button>
        </div>
      </form>
      
      <div class="mt-8 text-center text-sm" *ngIf="viewMode === 'forgot'">
        <button type="button" (click)="toggleView()" class="font-medium text-gray-500 hover:text-text transition hover:underline focus:outline-none inline-flex items-center">
          <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
          Retour à la connexion
        </button>
      </div>

    </div>
  </div>
</div>
